services:
  nuxt:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8374:3000"
      - "24678:24678"
    volumes:
      - .:/app
      - nuxt_node_modules:/app/node_modules
    command: sh -c "npm install && npx nuxt dev --host 0.0.0.0"
    environment:
      - NODE_ENV=development
      - JWT_SECRET=${JWT_SECRET:-super-secret-dev-key}
      - JWT_EXPIRY=${JWT_EXPIRY:-3600}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@exercise5.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123456}
      - MONGODB_URI=mongodb://mongo:27017/exercise5
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  nuxt_node_modules:
  mongo_data:
