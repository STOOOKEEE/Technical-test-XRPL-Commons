services:
  nuxt:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4938:3000"
      - "24678:24678"
    volumes:
      - .:/app
      - nuxt_node_modules:/app/node_modules
    command: sh -c "npm install && npx nuxt dev --host 0.0.0.0"
    environment:
      - NODE_ENV=development

volumes:
  nuxt_node_modules:
